<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <link rel="stylesheet" href="main.css"> <!-- Conecta o arquivo CSS à página-->
</head>
<body>
    <div class="calculadora">


        <div class="display">
            <span id="expression"></span> <!-- Espaço para mostrar a expressão digitada, ex: 2+3. Começa vazio. O JS preenche via id="expression".-->
            <span id="result">0</span> <!-- Espaço para mostrar o resultado. Começa com 0. O JS atualiza via id="result".-->
     
        </div>
        <div class="buttons">
            <button class="btn-clear" onclick="clearAll()">C</button>
            <button class="btn-operator" onclick="deleteLast()">⌫</button>
            <button class="btn-operator" onclick="appendValue('%')">%</button>
            <button class="btn-operator" onclick="appendValue('/')">÷</button>
            <button class="btn-operator" onclick="appendValue('*')">×</button>
            <button class="btn-operator" onclick="appendValue('-')">−</button>
            <button class="btn-operator" onclick="appendValue('+')">+</button>
            <button class="btn-equals" onclick="calculate()">=</button>
            <button onclick="appendValue('.')">.</button>
            
            
            <button class="btn-zero" onclick="appendValue('0')">0</button>
            <button onclick="appendValue('1')">1</button>
            <button onclick="appendValue('2')">2</button>
            <button onclick="appendValue('3')">3</button>
            <button onclick="appendValue('4')">4</button>
            <button onclick="appendValue('5')">5</button>
            <button onclick="appendValue('6')">6</button>
            <button onclick="appendValue('7')">7</button>
            <button onclick="appendValue('9')">9</button>
            <button onclick="appendValue('8')">8</button>          
        </div>
    </div>
    <script src="app.js"></script> <!--Conecta o arquivo JavaScript, Fica no final do body para que o HTML carregue primeiro-->
</body>
</html>
